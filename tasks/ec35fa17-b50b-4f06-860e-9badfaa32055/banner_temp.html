<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="utf-8">
<title>Banner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{
  width:1080px;height:1080px;
  overflow:hidden;
  font-family:'Heebo',Arial,sans-serif;
  direction:ltr;
  -webkit-font-smoothing:antialiased;
}
.banner{
  width:1080px;height:1080px;
  display:flex;flex-direction:column;
}
/* ── Main row ── */
.banner-main{
  flex:1;min-height:0;
  display:flex;flex-direction:row;
}
/* ── Left: photo panel ── */
.left-panel{
  width:44%;
  position:relative;overflow:hidden;
  flex-shrink:0;
}
.left-bg{
  position:absolute;inset:0;
  background-image:url('background.png');
  background-size:cover;background-position:center;
}
.left-overlay{
  position:absolute;inset:0;
  background:linear-gradient(
    145deg,
    rgba(10,18,36,0.92) 0%,
    rgba(51,102,255,0.60) 45%,
    rgba(10,18,36,0.80) 100%
  );
}
/* Brand accent bar between panels */
.panel-divider{
  width:6px;
  background:#3366FF;
  flex-shrink:0;
  box-shadow:2px 0 20px rgba(51,102,255,0.55);
}
/* ── Right: content panel ── */
.right-panel{
  flex:1;min-width:0;
  background:#f8fafc;
  display:flex;flex-direction:column;
  padding:44px 52px 40px 48px;
  direction:rtl;
}
.logo-row{
  flex-shrink:0;
  margin-bottom:30px;
}
.logo-row img{
  max-height:60px;max-width:200px;
  object-fit:contain;object-position:right;
}
.content{
  flex:1;display:flex;flex-direction:column;justify-content:center;
  gap:0;
}
.headline{
  font-size:44px;font-weight:900;line-height:1.18;
  color:#0f172a;
  margin-bottom:14px;
  letter-spacing:-0.4px;
  word-break:break-word;
}
.subhead{
  font-size:19px;font-weight:500;line-height:1.55;
  color:#475569;
  margin-bottom:30px;
}
.features{
  display:flex;flex-direction:column;gap:16px;
  margin-bottom:34px;
}
.feat{
  display:flex;align-items:flex-start;gap:14px;direction:rtl;
}
.feat-icon{
  width:30px;height:30px;flex-shrink:0;
  background-color:#3366FF;
  color:#ffffff;
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:800;
  box-shadow:0 3px 10px rgba(51,102,255,0.40);
}
.feat-text{
  font-size:17px;font-weight:500;
  color:#1e293b;line-height:1.45;
  padding-top:3px;
}
.cta-btn{
  display:inline-block;
  background-color:#3366FF;
  color:#ffffff;
  font-size:21px;font-weight:800;
  padding:16px 32px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 8px 28px rgba(51,102,255,0.48);
  align-self:stretch;
  letter-spacing:0.2px;
}
/* ── Bottom strip ── */
.bottom-strip{
  height:70px;flex-shrink:0;
  background-color:#3366FF;
  display:flex;align-items:center;justify-content:center;
  direction:ltr;
  box-shadow:0 -4px 24px rgba(51,102,255,0.35);
}
.bottom-text{
  font-size:23px;font-weight:700;
  color:#ffffff;
  letter-spacing:0.5px;
}
</style>
</head>
<body>
<div class="banner">
  <div class="banner-main">

    <!-- Left: DALL-E background -->
    <div class="left-panel">
      <div class="left-bg"></div>
      <div class="left-overlay"></div>
    </div>

    <!-- Brand accent divider -->
    <div class="panel-divider" aria-hidden="true"></div>

    <!-- Right: content -->
    <div class="right-panel">
      <div class="logo-row">
        <img src="logo.png" alt="לוגו" loading="eager" decoding="sync">
      </div>
      <div class="content">
        <div class="headline">TSITE - הפתרון שלך לבניית אתרים מהירים ומרהיבים</div>
        <div class="subhead">הקמת אתר מקצועי בקלות, ללא ידע טכני מוקדם</div>
        <div class="features">
      <div class="feat">
        <span class="feat-icon" aria-hidden="true">✓</span>
        <span class="feat-text">מערכת בניית אתרים ללא תלות בתוספים חיצוניים</span>
      </div>
      <div class="feat">
        <span class="feat-icon" aria-hidden="true">✓</span>
        <span class="feat-text">שילוב עריכה חיה וכלים מבוססי AI לשיפור חווית המשתמש</span>
      </div>
      <div class="feat">
        <span class="feat-icon" aria-hidden="true">✓</span>
        <span class="feat-text">אתר אופטימלי ללא פשרות בביצועים וקידום בגוגל</span>
      </div>
        </div>
        <div class="cta-btn">התחילו עכשיו</div>
      </div>
    </div>

  </div>
  <!-- Bottom brand strip -->
  <div class="bottom-strip">
    <span class="bottom-text">www.tsite.co.il</span>
  </div>
</div>
</body>
</html>
