<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="utf-8">
<title>Banner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{
  width:1080px;height:1080px;
  overflow:hidden;
  font-family:'Heebo',Arial,sans-serif;
  direction:ltr;
  -webkit-font-smoothing:antialiased;
}
.banner{
  width:1080px;height:1080px;
  display:flex;flex-direction:column;
}
/* ── Main row ── */
.banner-main{
  flex:1;min-height:0;
  display:flex;flex-direction:row;
}
/* ── Left: photo panel ── */
.left-panel{
  width:44%;
  position:relative;overflow:hidden;
  flex-shrink:0;
}
.left-bg{
  position:absolute;inset:0;
  background-image:url('background.png');
  background-size:cover;background-position:center;
}
.left-overlay{
  position:absolute;inset:0;
  background:linear-gradient(
    145deg,
    rgba(10,18,36,0.92) 0%,
    rgba(255,165,0,0.60) 45%,
    rgba(10,18,36,0.80) 100%
  );
}
/* Brand accent bar between panels */
.panel-divider{
  width:6px;
  background:#FFA500;
  flex-shrink:0;
  box-shadow:2px 0 20px rgba(255,165,0,0.55);
}
/* ── Right: content panel ── */
.right-panel{
  flex:1;min-width:0;
  background:linear-gradient(155deg,#ffffff 0%,#f8fafc 55%,rgba(255,165,0,0.07) 100%);
  display:flex;flex-direction:column;
  padding:44px 52px 40px 48px;
  direction:rtl;
}
.logo-row{
  flex-shrink:0;
  margin-bottom:30px;
  display:flex;
  justify-content:flex-start;
}
.logo-row img{
  max-height:60px;max-width:200px;
  object-fit:contain;object-position:left center;
}
.content{
  flex:1;display:flex;flex-direction:column;justify-content:center;
  gap:0;
}
.headline{
  font-size:44px;font-weight:900;line-height:1.18;
  color:#0f172a;
  margin-bottom:14px;
  letter-spacing:-0.4px;
  word-break:break-word;
}
.subhead{
  font-size:19px;font-weight:500;line-height:1.55;
  color:#475569;
  margin-bottom:30px;
}
.features{
  display:flex;flex-direction:row;gap:14px;
  margin-bottom:34px;
  direction:rtl;
}
.feat-card{
  flex:1;min-width:0;
  background:#ffffff;
  border-radius:14px;
  padding:20px 16px 16px;
  box-shadow:0 2px 8px rgba(0,0,0,0.06),0 8px 24px rgba(0,0,0,0.06);
  border-top:4px solid;
  display:flex;flex-direction:column;gap:12px;
  direction:rtl;
}
.feat-icon{
  width:32px;height:32px;flex-shrink:0;
  border-radius:8px;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:800;
}
.feat-text{
  font-size:15px;font-weight:600;
  color:#1e293b;line-height:1.45;
  direction:rtl;text-align:right;
}
.cta-btn{
  display:inline-block;
  background-color:#FFA500;
  color:#0f172a;
  font-size:21px;font-weight:800;
  padding:16px 32px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 8px 28px rgba(255,165,0,0.48);
  align-self:stretch;
  letter-spacing:0.2px;
}
/* ── Bottom strip ── */
.bottom-strip{
  height:70px;flex-shrink:0;
  background-color:#FFA500;
  display:flex;align-items:center;justify-content:center;
  direction:ltr;
  box-shadow:0 -4px 24px rgba(255,165,0,0.35);
}
.bottom-text{
  font-size:23px;font-weight:700;
  color:#0f172a;
  letter-spacing:0.5px;
}
</style>
</head>
<body>
<div class="banner">
  <div class="banner-main">

    <!-- Left: DALL-E background -->
    <div class="left-panel">
      <div class="left-bg"></div>
      <div class="left-overlay"></div>
    </div>

    <!-- Brand accent divider -->
    <div class="panel-divider" aria-hidden="true"></div>

    <!-- Right: content -->
    <div class="right-panel">
      <div class="logo-row">
        <img src="logo.png" alt="לוגו" loading="eager" decoding="sync">
      </div>
      <div class="content">
        <div class="headline">סימון כבישים וחניונים עם סימונים - הבטיחו את הבטיחות על הכביש</div>
        <div class="subhead">פתרונות סימון מקצועיים למניעת תאונות והכוונת הנהגים</div>
        <div class="features" dir="rtl">
      <div class="feat-card" style="border-top-color:#FFA500;">
        <div class="feat-icon" style="background-color:#FFA500;color:#0f172a;">✓</div>
        <span class="feat-text">צבעים תקניים ועמידים לשימוש ארוך טווח</span>
      </div>
      <div class="feat-card" style="border-top-color:#FFA500;">
        <div class="feat-icon" style="background-color:#FFA500;color:#0f172a;">✓</div>
        <span class="feat-text">שירות מותאם למוסדות, עיריות וקבלנים</span>
      </div>
      <div class="feat-card" style="border-top-color:#FFA500;">
        <div class="feat-icon" style="background-color:#FFA500;color:#0f172a;">✓</div>
        <span class="feat-text">מחירים נוחים ושירות אדיב</span>
      </div>
        </div>
        <div class="cta-btn">צור קשר עכשיו</div>
      </div>
    </div>

  </div>
  <!-- Bottom brand strip -->
  <div class="bottom-strip">
    <span class="bottom-text">www.simoonim.co.il</span>
  </div>
</div>
</body>
</html>
